spring:
  application:
    name: knowledgeos

  datasource:
    url: jdbc:postgresql://localhost:5433/knowledgeos
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
        chat:
          options:
            model: gemini-1.5-flash

server:
  port: 8081 # Port 8081 to avoid conflicts
